<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRAFTWAR ACCESS</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;700&display=swap" rel="stylesheet">

<!-- ✅ USE YOUR EXISTING CSS HERE -->
<link rel="stylesheet" href="styles.css">

<style>
/* ===== LOGIN SPECIFIC ===== */

.login-wrapper {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.login-panel {
  width: 420px;
  padding: 40px 30px;
  background: var(--panel);
  border: 1px solid var(--border);
  backdrop-filter: blur(12px);
  position: relative;

  clip-path: polygon(
    0 0,
    calc(100% - 15px) 0,
    100% 15px,
    100% 100%,
    15px 100%,
    0 calc(100% - 15px)
  );

  box-shadow:
    0 0 25px rgba(0,245,255,0.15),
    inset 0 0 20px rgba(0,245,255,0.05);
}

/* glowing edge animation */
.login-panel::before {
  content: "";
  position: absolute;
  inset: -1px;
  background: linear-gradient(45deg, transparent, var(--cyan), transparent);
  opacity: 0.2;
  animation: borderFlow 4s linear infinite;
}

@keyframes borderFlow {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* TITLE */
.login-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 2rem;
  text-align: center;
  margin-bottom: 25px;

  background: linear-gradient(135deg, var(--cyan), var(--green), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  letter-spacing: 3px;
}

/* INPUT */
.login-input {
  width: 100%;
  padding: 14px;
  margin-bottom: 20px;

  background: #000;
  border: 1px solid var(--cyan);
  color: var(--cyan);

  font-family: 'Share Tech Mono', monospace;
  font-size: 0.9rem;

  outline: none;
  transition: 0.3s;
}

.login-input:focus {
  box-shadow: 0 0 10px var(--cyan);
  border-color: var(--cyan);
}

/* BUTTON */
.login-btn {
  width: 100%;
  padding: 14px;

  font-family: 'Orbitron', sans-serif;
  letter-spacing: 3px;

  background: transparent;
  border: 2px solid var(--cyan);
  color: var(--cyan);

  cursor: pointer;
  transition: 0.3s;
  position: relative;
  overflow: hidden;
}

.login-btn::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(0,245,255,0.2), transparent);
  transform: translateX(-100%);
  transition: 0.4s;
}

.login-btn:hover::before {
  transform: translateX(100%);
}

.login-btn:hover {
  background: rgba(0,245,255,0.1);
  box-shadow: 0 0 20px var(--cyan);
}

/* subtitle */
.login-sub {
  text-align: center;
  margin-top: 15px;
  font-size: 0.65rem;
  color: rgba(0,245,255,0.4);
  font-family: 'Share Tech Mono', monospace;
  letter-spacing: 2px;
}
</style>
</head>

<body>

<div class="cyber-lines">
  <div class="line-h"></div>
  <div class="line-h"></div>
  <div class="line-h"></div>
  <div class="line-v"></div>
  <div class="line-v"></div>
</div>

<div class="login-wrapper">

  <div class="login-panel">

    <div class="login-title">CRAFTWAR ACCESS</div>

    <input
      type="password"
      id="passwordInput"
      class="login-input"
      placeholder="ENTER PASSWORD"
    >

    <button class="login-btn" onclick="login()">
      ENTER
    </button>

    <div class="login-sub">
      // AUTH REQUIRED — UNAUTHORIZED ACCESS DENIED //
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
